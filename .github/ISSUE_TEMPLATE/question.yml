name: ❓ Question
description: Ask a question about using the application.
title: ❓[Question] Enter a title
labels: question
body:
  - type: markdown
    attributes:
      value: |
        📝 **Use the title field above to provide a clear question title.** This helps others understand your question quickly.
        Example: ❓[Question] How do I set recording quality for one stream?
  - type: checkboxes
    attributes:
      label: ⚠️ Search for similar questions
      description: >
        🔍 [Search existing issues](https://github.com/ihmily/StreamCap/issues?q=is%3Aissue) with relevant keywords to see whether someone has already asked this.
      options:
        - label: I have searched existing issues and found no similar question.
          required: true
  - type: dropdown
    attributes:
      label: 🔧 Runtime mode
      description: Select how you run the application.
      options:
        - Prebuilt executable
        - Source code
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 🐍 Python version, if running from source
      description: Select the Python version used to run the application.
      options:
        - Python 3.10
        - Python 3.11
        - Python 3.12
        - Python 3.13
        - Other (describe it in the question)
    validations:
      required: false
  - type: dropdown
    attributes:
      label: 💻 Operating system
      description: Select your operating system.
      options:
        - Windows 10
        - Windows 11
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Other (describe it in the question)
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🤔 Question details
      description: Provide all relevant details for your question.
      placeholder: |
        What exactly is your question about?
    validations:
      required: true
