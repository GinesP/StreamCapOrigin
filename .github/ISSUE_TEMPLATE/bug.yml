name: 🐛 Bug report
description: Create a bug report to help improve the project.
title: 🐛[BUG] Enter a title
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        📝 **Use the title field above to provide a clear, concise title**, for example: 🐛[Bug] Bilibili rooms fail to record.
  - type: checkboxes
    attributes:
      label: ⚠️ Check for existing issues
      description: >
        🔍 [Search existing issues](https://github.com/ihmily/StreamCap/issues?q=is%3Aissue)
        and make sure this problem has not already been reported.
      options:
        - label: I have searched existing issues and found no duplicate.
          required: true
  - type: dropdown
    attributes:
      label: 🔧 Runtime mode
      description: Select how you run the application.
      options:
        - Prebuilt application
        - Source code
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 🐍 Python version, if running from source
      description: Select the Python version used to run the application.
      options:
        - Python 3.10
        - Python 3.11
        - Python 3.12
        - Python 3.13
        - Other (describe it in the issue)
    validations:
      required: false
  - type: dropdown
    attributes:
      label: 💻 Operating system
      description: Select your operating system.
      options:
        - Windows 10
        - Windows 11
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Other (describe it in the issue)
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: ⚠️ Confirm that you retried
      description: >
        Some failures can be caused by local device or network issues.
      options:
        - label: I have retried multiple times and the problem still occurs.
          required: true
  - type: textarea
    attributes:
      label: 🕹 Reproduction steps
      description: |
        **⚠️ Issues that cannot be reproduced may be closed.**
        Please use this format:
        1. The stream URL is...
        2. The recording format is...
        3. ...
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: 😯 Problem description
      description: Describe the problem in detail. Screenshots are welcome.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 📜 Error output
      description: Paste relevant logs, errors, or screenshots if available.
    validations:
      required: false
